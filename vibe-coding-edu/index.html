<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Vibe Coding · 바이브 코딩 교육</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* Match the final picks from chat: DM Serif + 본명조 + 본고딕 + accent hue 46 */
    :root {
      --serif: "DM Serif Display", "Noto Serif KR", Georgia, serif;
      --sans:  "Inter", "Noto Sans KR", -apple-system, system-ui, sans-serif;
      --accent:     oklch(0.62 0.15 46);
      --accent-ink: oklch(0.55 0.16 46);
    }

    .masthead {
      max-width: 1280px;
      margin: 0 auto;
      padding: 56px 56px 28px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid var(--ink);
    }
    .masthead .lockup {
      display: flex;
      align-items: baseline;
      gap: 18px;
    }
    .masthead h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 44px;
      letter-spacing: -0.025em;
      margin: 0;
      line-height: 1;
    }
    .masthead .subtitle {
      font-family: var(--serif);
      color: var(--ink-3);
      font-size: 18px;
      letter-spacing: -0.01em;
    }
    .masthead .meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-3);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: right;
    }

    .hero {
      max-width: 1280px;
      margin: 0 auto;
      padding: 96px 56px 88px;
      border-bottom: 1px solid var(--ink);
      display: grid;
      grid-template-columns: minmax(0, 7fr) minmax(0, 4fr);
      gap: 72px;
      align-items: end;
    }
    .hero h2 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 96px;
      line-height: 0.95;
      letter-spacing: -0.035em;
      margin: 0;
      text-wrap: balance;
    }
    .hero .lede {
      font-size: 19px;
      line-height: 1.7;
      color: var(--ink-2);
      max-width: 420px;
      text-wrap: pretty;
    }
    .hero .lede p { margin: 0 0 14px; }

    .toc {
      max-width: 1280px;
      margin: 0 auto;
      padding: 64px 56px 120px;
    }
    .toc-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 28px;
    }
    .toc-head .label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    .toc-head .count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-4);
      letter-spacing: 0.1em;
    }

    .ch-list {
      list-style: none;
      margin: 0;
      padding: 0;
      border-top: 1px solid var(--ink);
    }
    .ch-row {
      display: grid;
      grid-template-columns: 120px 110px minmax(0, 1fr) 100px;
      gap: 32px;
      align-items: baseline;
      padding: 28px 8px;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
      transition: background 0.18s, padding 0.18s;
    }
    .ch-row:hover {
      background: var(--paper);
      padding-left: 16px;
    }
    .ch-num {
      font-family: var(--serif);
      font-size: 56px;
      line-height: 1;
      color: var(--accent-ink);
      letter-spacing: -0.03em;
      font-weight: 400;
    }
    .ch-kicker {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    .ch-title {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 32px;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin: 0 0 10px;
      text-wrap: balance;
    }
    .ch-title-en {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-3);
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }
    .ch-summary {
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink-2);
      max-width: 620px;
      text-wrap: pretty;
    }
    .ch-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-3);
      letter-spacing: 0.06em;
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
    }
    .ch-tag {
      padding: 3px 8px;
      border: 1px solid var(--line);
      color: var(--ink-2);
      border-radius: 2px;
    }

    .footer {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 56px 56px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-4);
      letter-spacing: 0.08em;
    }

    @media (max-width: 760px) {
      .masthead, .hero, .toc, .footer { padding-left: 24px; padding-right: 24px; }
      .hero { grid-template-columns: 1fr; gap: 36px; padding-top: 56px; padding-bottom: 56px; }
      .hero h2 { font-size: 56px; }
      .ch-row {
        grid-template-columns: 64px 1fr;
        gap: 18px;
        padding: 22px 0;
      }
      .ch-row:hover { padding-left: 6px; }
      .ch-num { font-size: 36px; }
      .ch-kicker, .ch-meta { grid-column: 2; text-align: left; align-items: flex-start; }
      .ch-body { grid-column: 2; }
      .ch-title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <header class="masthead">
    <div class="lockup">
      <h1>Vibe Coding</h1>
      <span class="subtitle">바이브 코딩 — 연구팀 가이드</span>
    </div>
    <div class="meta" id="masthead-meta"></div>
  </header>

  <section class="hero">
    <h2>코드를 <em style="font-style: italic; color: var(--accent-ink);">쓰는</em> 게 아니라 <br/>지시하는 방식.</h2>
    <div class="lede">
      <p>2025–26, AI 연구의 병목은 <strong>코드 작성</strong>에서 <strong>실험 설계와 해석</strong>으로 옮겨갔습니다. 이 가이드는 연구팀이 Claude Code를 도구가 아닌 협업 환경으로 받아들이도록 8개 챕터로 정리한 사내용 자료입니다.</p>
      <p>각 챕터는 5–18분 분량. 아래에서 시작하세요.</p>
    </div>
  </section>

  <section class="toc">
    <div class="toc-head">
      <span class="label">Table of Chapters</span>
      <span class="count" id="ch-count"></span>
    </div>
    <ol class="ch-list" id="ch-list"></ol>
  </section>

  <footer class="footer">
    <span id="footer-org"></span>
    <a href="../index.html" style="color: inherit;">← Paper Seminar</a>
  </footer>

  <script src="data.js"></script>
  <script>
    (function () {
      const { meta, steps } = window.VIBE_DATA;

      document.getElementById('masthead-meta').textContent = `${meta.issue} · ${meta.org}`;
      document.getElementById('footer-org').textContent = `${meta.org} · ${meta.issue}`;
      document.getElementById('ch-count').textContent = `${steps.length} chapters · 약 90분`;

      const list = document.getElementById('ch-list');
      const frag = document.createDocumentFragment();

      steps.forEach((s) => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = `detail.html?id=${s.id}`;
        a.className = 'ch-row';

        a.innerHTML = `
          <span class="ch-num">${s.num}</span>
          <span class="ch-kicker">${s.kicker}</span>
          <div class="ch-body">
            <h3 class="ch-title">${s.title}</h3>
            <div class="ch-title-en">${s.titleEn}</div>
            <p class="ch-summary">${s.summary}</p>
          </div>
          <div class="ch-meta">
            <span class="ch-tag">${s.tag}</span>
            <span>⏱ ${s.readTime}</span>
          </div>
        `;
        li.appendChild(a);
        frag.appendChild(li);
      });

      list.appendChild(frag);
    })();
  </script>
</body>
</html>
